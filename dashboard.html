<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cheverly Air Quality | Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>

<!-- Marker clustering (FIXES OVERLAP + “missing dots” feel) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>
:root{
--brand:#1a305e;
--blue:#4477ce;
--green:#00e400;
--yellow:#ffff00;
--orange:#ff7e00;
--red:#ff0000;
--purple:#8f3f97;
--maroon:#7e0023;
}

html,body{
margin:0;
padding:0;
height:100%;
font-family:Segoe UI,sans-serif;
overflow:hidden;
background:#fdfdfd;
}

.topbar{
height:64px;
background:var(--brand);
color:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 24px;
}

.brand{font-weight:700;font-size:1.2rem;}

.nav a{
color:#fff;
text-decoration:none;
margin-left:18px;
opacity:.85;
}

.nav a.active{
opacity:1;
border-bottom:2px solid #fff;
padding-bottom:4px;
}

#layout{display:flex;height:calc(100vh - 64px);}

#sidebar{
width:370px;
background:#f4f6f8;
border-right:1px solid #ddd;
padding:20px;
overflow-y:auto;
box-sizing:border-box;
}

.card{
background:#fff;
padding:18px;
border-radius:12px;
border:1px solid #ddd;
margin-bottom:18px;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}

label{
display:block;
font-size:.75rem;
font-weight:700;
margin-bottom:8px;
text-transform:uppercase;
color:#666;
}

input,select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
width:100%;
padding:13px;
margin-top:10px;
border:none;
border-radius:8px;
background:var(--blue);
color:#fff;
font-weight:700;
cursor:pointer;
}

#main-content{
flex:1;
display:flex;
flex-direction:column;
}

#map{
height:45%;
border-bottom:1px solid #ddd;
}

#chart-box{
height:55%;
padding:18px;
box-sizing:border-box;
background:#fff;
}

.aqi-val{
font-size:72px;
font-weight:900;
text-align:center;
line-height:1;
}

.sublabel{
text-align:center;
font-size:.75rem;
color:#777;
font-weight:700;
margin-top:6px;
}

.kv{text-align:center;margin-top:14px;}

.ceaqi-breakdown{
margin-top:12px;
padding-top:12px;
border-top:1px solid #eee;
font-size:.78rem;
}

.ceaqi-row{
display:flex;
justify-content:space-between;
padding:2px 0;
}

.base-row{font-weight:700;}

.map-legend{
position:absolute;
top:82px;
right:15px;
z-index:1000;
background:rgba(255,255,255,.95);
padding:12px;
border-radius:12px;
border:1px solid rgba(0,0,0,.1);
}

.legend-item{
display:flex;
align-items:center;
font-size:.8rem;
margin-bottom:5px;
}

.dot{
width:12px;height:12px;border-radius:50%;
margin-right:8px;border:1px solid #000;
}

.dashboard-disclaimer{
position:fixed;
bottom:0;left:0;right:0;
background:rgba(255,255,255,.9);
padding:4px 16px;
font-size:.7rem;
text-align:center;
border-top:1px solid #ddd;
z-index:3000;
}
</style>
</head>

<body>

<header class="topbar">
<div class="brand">Cheverly Air Quality</div>
<nav class="nav">
<a href="index.html">Home</a>
<a href="dashboard.html" class="active">Map & Data</a>
<a href="writeup.html">FAQs</a>
</nav>
</header>

<div id="layout">

<aside id="sidebar">

<div class="card">
<label>Location Search</label>
<input id="addrInput" placeholder="Enter address">
<button id="locateBtn">Find Nearest Station</button>
</div>

<div class="card">
<label>Station Selection</label>
<select id="devSel" onchange="handleDropdownChange(this.value,true)"></select>
</div>

<div class="card">
<label>Live Station Reading</label>

<div id="statName" style="text-align:center;font-weight:700;color:var(--brand);margin-bottom:10px;">--</div>
<div id="statAQI" class="aqi-val">--</div>
<div class="sublabel">CE-AQI</div>

<div class="kv">
<div id="val_param" style="font-size:1.1rem;font-weight:700;">--</div>
<div class="sublabel">Concentration</div>
</div>

<div id="ceaqi-breakdown" class="ceaqi-breakdown" style="display:none;">
<div style="font-weight:700;margin-bottom:6px;">CE-AQI Breakdown</div>
<div id="ceaqi-rows"></div>
</div>

</div>

</aside>

<div id="main-content">

<div id="map"></div>

<div class="map-legend">
<div class="legend-item"><span class="dot" style="background:var(--green)"></span>Good</div>
<div class="legend-item"><span class="dot" style="background:var(--yellow)"></span>Moderate</div>
<div class="legend-item"><span class="dot" style="background:var(--orange)"></span>Sensitive</div>
<div class="legend-item"><span class="dot" style="background:var(--red)"></span>Unhealthy</div>
<div class="legend-item"><span class="dot" style="background:var(--purple)"></span>Very Unhealthy</div>
<div class="legend-item"><span class="dot" style="background:var(--maroon)"></span>Hazardous</div>
</div>

<div id="chart-box">
<canvas id="airChart"></canvas>
</div>

</div>
</div>

<div class="dashboard-disclaimer">
Experimental community air quality dashboard.
</div>

<script>

/* =========================
   DATASETS
========================= */

const SENSORS = {
"52823":"EJAT.CV.6.52823","53677":"EJAT.CV.1.53677","54239":"EJAT.CV.6.54239","54293":"EJAT.CV.2.54293",
"57777":"EJAT.CV.1.57777","57783":"EJAT.CV.6.57783","57811":"EJAT.CV.4.57811","57841":"EJAT.CV.3.57841",
"203577":"EJAT.CV.2.203577","203601":"EJAT.CV.1.203601","207729":"EJAT.CV.1.207729","211993":"EJAT.CV.3.211993",
"156595":"EJAT.CV.156595","284362":"EJAT.PG.1.284362","160037":"EJAT.PG.1.160037","175563":"EJAT.PG.1.175563",
"178169":"EJAT.PG.1.178169","184191":"EJAT.PG.1.184191","197937":"EJAT.PG.1.197937","218227":"EJAT.PG.1.218227",
"218237":"EJAT.PG.1.218237","218273":"EJAT.PG.1.218273","57955":"EJAT.FH.1.57955","185085":"EJAT.FH.1.185085",
"203597":"EJAT.FH.1.203597","181253":"EJAT.CH.1.181253"
};

const SPODS=[
{sn:"MOD-00745",name:"QuantAQ MOD-00745",lat:38.9051,lon:-76.91},
{sn:"MOD-00746",name:"QuantAQ MOD-00746",lat:39.1432,lon:-76.846},
{sn:"MOD-00747",name:"QuantAQ MOD-00747",lat:39.233944,lon:-76.504501},
{sn:"MOD-00748",name:"QuantAQ MOD-00748",lat:38.969685,lon:-76.54229},
{sn:"MOD-00749",name:"QuantAQ MOD-00749",lat:39.0554,lon:-76.8788}
];

const C12S=[
{compId:"D14781",name:"C-12 D14781",lat:null,lon:null},
{compId:"D14645",name:"C-12 D14645",lat:null,lon:null},
{compId:"D17615",name:"C-12 D17615",lat:null,lon:null},
{compId:"E10588",name:"C-12 E10588",lat:null,lon:null},
{compId:"D14646",name:"C-12 D14646",lat:null,lon:null}
];

/* =========================
   MAP
========================= */

const map=L.map("map").setView([38.9213,-76.9175],14);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

const markerGroup=L.markerClusterGroup({disableClusteringAtZoom:16});
map.addLayer(markerGroup);

let markerMap={};

/* =========================
   COLOR FIX
========================= */

function getAQIColor(aqi){
aqi=Number(aqi);
if(!Number.isFinite(aqi))return "#bbbbbb";
if(aqi<=50)return "#00e400";
if(aqi<=100)return "#ffff00";
if(aqi<=150)return "#ff7e00";
if(aqi<=200)return "#ff0000";
if(aqi<=300)return "#8f3f97";
return "#7e0023";
}

/* =========================
   SAFE MARKERS (FIXED)
========================= */

function createMarker(id,lat,lon,val){

if(lat==null||lon==null)return;

const safeVal=Number.isFinite(val)?val:0;

const marker=L.circleMarker([lat,lon],{
radius:10,
fillColor:getAQIColor(safeVal),
color:"#111",
weight:1,
fillOpacity:0.9
});

marker.bindTooltip(`CE-AQI: ${safeVal}`);

marker.on("click",()=>{
document.getElementById("devSel").value=id;
handleDropdownChange(id,true);
});

markerGroup.addLayer(marker);
markerMap[id]=marker;
}

/* =========================
   BASIC HELPERS
========================= */

function safeNum(x){const v=Number(x);return Number.isFinite(v)?v:null;}

</script>

</body>
</html>
