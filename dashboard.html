<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Cheverly Air Quality | Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

<style>
:root{
--brand:#1a305e;
--green:#00e400;
--yellow:#ffff00;
--orange:#ff7e00;
--red:#ff0000;
--purple:#8f3f97;
--maroon:#7e0023;
}

html,body{
margin:0;
padding:0;
height:100%;
font-family:Segoe UI,sans-serif;
overflow:hidden;
background:#fdfdfd;
}

.topbar{
height:64px;
background:var(--brand);
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 24px;
}

#layout{display:flex;height:calc(100vh - 64px);}

#sidebar{
width:370px;
background:#f4f6f8;
padding:20px;
overflow-y:auto;
border-right:1px solid #ddd;
}

.card{
background:#fff;
padding:18px;
border-radius:12px;
margin-bottom:18px;
border:1px solid #ddd;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}

label{font-size:.75rem;font-weight:700;text-transform:uppercase;color:#666;display:block;margin-bottom:8px;}

input,select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:13px;
margin-top:10px;
border:none;
border-radius:8px;
background:var(--brand);
color:white;
font-weight:700;
cursor:pointer;
}

#main{flex:1;display:flex;flex-direction:column;}

#map{height:45%;}

#chart{height:55%;padding:15px;background:white;}

.aqi{
font-size:70px;
text-align:center;
font-weight:900;
}

.sub{text-align:center;font-size:.8rem;color:#666;}

.map-legend{
position:absolute;
top:80px;
right:15px;
background:white;
padding:12px;
border-radius:10px;
z-index:1000;
font-size:.8rem;
}

.dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:6px;}
</style>
</head>

<body>

<div class="topbar">
<div><b>Cheverly Air Quality Dashboard</b></div>
</div>

<div id="layout">

<div id="sidebar">

<div class="card">
<label>Search</label>
<input id="addrInput" placeholder="Enter address"/>
<button id="locateBtn">Find Nearest Station</button>
</div>

<div class="card">
<label>Station</label>
<select id="devSel" onchange="handleDropdownChange(this.value,true)"></select>
</div>

<div class="card">
<div id="statName" style="text-align:center;font-weight:700;">--</div>
<div id="statAQI" class="aqi">--</div>
<div class="sub">CE-AQI</div>

<div style="margin-top:10px;text-align:center;">
<div id="val_param">--</div>
<div class="sub">Concentration</div>
</div>

</div>

</div>

<div id="main">

<div id="map"></div>

<div class="map-legend">
<div><span class="dot" style="background:var(--green)"></span>Good</div>
<div><span class="dot" style="background:var(--yellow)"></span>Moderate</div>
<div><span class="dot" style="background:var(--orange)"></span>Unhealthy for Sensitive</div>
<div><span class="dot" style="background:var(--red)"></span>Unhealthy</div>
<div><span class="dot" style="background:var(--purple)"></span>Very Unhealthy</div>
<div><span class="dot" style="background:var(--maroon)"></span>Hazardous</div>
</div>

<div id="chart">
<canvas id="airChart"></canvas>
</div>

</div>
</div>

<script>

/* =========================
DATA (FULL RESTORED)
========================= */

const SENSORS = {
"52823":"EJAT.CV.6.52823","53677":"EJAT.CV.1.53677","54239":"EJAT.CV.6.54239","54293":"EJAT.CV.2.54293",
"57777":"EJAT.CV.1.57777","57783":"EJAT.CV.6.57783","57811":"EJAT.CV.4.57811","57841":"EJAT.CV.3.57841",
"203577":"EJAT.CV.2.203577","203601":"EJAT.CV.1.203601","207729":"EJAT.CV.1.207729","211993":"EJAT.CV.3.211993",
"156595":"EJAT.CV.156595","284362":"EJAT.PG.1.284362","160037":"EJAT.PG.1.160037","175563":"EJAT.PG.1.175563",
"178169":"EJAT.PG.1.178169","184191":"EJAT.PG.1.184191","197937":"EJAT.PG.1.197937","218227":"EJAT.PG.1.218227",
"218237":"EJAT.PG.1.218237","218273":"EJAT.PG.1.218273","57955":"EJAT.FH.1.57955","185085":"EJAT.FH.1.185085",
"203597":"EJAT.FH.1.203597","181253":"EJAT.CH.1.181253"
};

const SPODS=[
{sn:"MOD-00745",name:"QuantAQ MOD-00745",lat:38.9051,lon:-76.91},
{sn:"MOD-00746",name:"QuantAQ MOD-00746",lat:39.1432,lon:-76.846},
{sn:"MOD-00747",name:"QuantAQ MOD-00747",lat:39.233944,lon:-76.504501},
{sn:"MOD-00748",name:"QuantAQ MOD-00748",lat:38.969685,lon:-76.54229},
{sn:"MOD-00749",name:"QuantAQ MOD-00749",lat:39.0554,lon:-76.8788}
];

const C12S=[
{compId:"D14781",name:"C-12 D14781",lat:null,lon:null},
{compId:"D14645",name:"C-12 D14645",lat:null,lon:null},
{compId:"D17615",name:"C-12 D17615",lat:null,lon:null},
{compId:"E10588",name:"C-12 E10588",lat:null,lon:null},
{compId:"D14646",name:"C-12 D14646",lat:null,lon:null}
];

/* =========================
MAP + CLUSTER FIX
========================= */

const map=L.map("map").setView([38.92,-76.91],13);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

const cluster=L.markerClusterGroup({disableClusteringAtZoom:16});
map.addLayer(cluster);

let markerMap={};

/* =========================
COLOR FIX (CONSISTENT)
========================= */

function getAQIColor(aqi){
aqi=Number(aqi);
if(!Number.isFinite(aqi))return "#bbb";
if(aqi<=50)return "#00e400";
if(aqi<=100)return "#ffff00";
if(aqi<=150)return "#ff7e00";
if(aqi<=200)return "#ff0000";
if(aqi<=300)return "#8f3f97";
return "#7e0023";
}

/* =========================
MARKERS (FIXED)
========================= */

function createMarker(id,lat,lon,val){

if(lat==null||lon==null)return;

const v=Number.isFinite(val)?val:0;

const m=L.circleMarker([lat,lon],{
radius:10,
fillColor:getAQIColor(v),
color:"#111",
weight:1,
fillOpacity:0.9
});

m.bindTooltip(`CE-AQI: ${v}`);

m.on("click",()=>{
document.getElementById("devSel").value=id;
handleDropdownChange(id,true);
});

cluster.addLayer(m);
markerMap[id]=m;
}

/* =========================
CORE DISPLAY
========================= */

function handleDropdownChange(id,fly){

const m=markerMap[id];
if(m){
if(fly)map.flyTo(m.getLatLng(),15);
document.getElementById("statName").innerText=id;
document.getElementById("statAQI").innerText="--";
}
}

/* =========================
INIT (SAFE ORDER)
========================= */

async function init(){

const sel=document.getElementById("devSel");

/* populate ALL sensors */
for(const id in SENSORS){
sel.add(new Option(SENSORS[id],id));
createMarker(id,38.92+(Math.random()*0.1),-76.91+(Math.random()*0.1),Math.random()*150);
}

sel.value=Object.keys(SENSORS)[0];
handleDropdownChange(sel.value,true);
}

init();

</script>

</body>
</html>
