<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cheverly Air Quality | Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

  <style>
    :root { 
      --brand-navy: #1a305e; --search-blue: #4477ce; 
      --aqi-green: #00e400; --aqi-yellow: #ffff00;
      --aqi-orange: #ff7e00; --aqi-red: #ff0000;
      --aqi-purple: #8f3f97; --aqi-maroon: #7e0023;
    }
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: "Segoe UI", Roboto, sans-serif; overflow: hidden; background: #fdfdfd; }
    .topbar { background: var(--brand-navy); color: white; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; height: 64px; z-index: 2000; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    #layout { display: flex; height: calc(100vh - 64px); width: 100vw; }
    #sidebar { width: 380px; min-width: 380px; background: #f4f6f8; border-right: 1px solid #ddd; padding: 1.25rem; overflow-y: auto; box-sizing: border-box; }
    .card { background: white; padding: 1.25rem; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    label { font-size: 0.75rem; font-weight: bold; color: #666; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.5px; }
    input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 0.9rem; }
    button { width: 100%; padding: 14px; margin-top: 10px; border-radius: 8px; border: none; background: var(--search-blue); color: white; font-weight: bold; cursor: pointer; transition: filter 0.2s; font-size: 0.9rem; }
    #main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
    #map { height: 45%; width: 100%; border-bottom: 1px solid #ddd; z-index: 1; }
    #chart-box { height: 55%; width: 100%; padding: 1.5rem; box-sizing: border-box; background: white; }
    .aqi-val { font-size: 72px; font-weight: 900; display: block; text-align: center; line-height: 1.1; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000; }
    .sublabel { font-size: 0.75rem; color: #777; font-weight: bold; margin-top: 4px; text-align: center; text-transform: uppercase; }
    .ceaqi-breakdown { margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; font-size: 0.78rem; color: #555; }
    .ceaqi-row { display: flex; justify-content: space-between; padding: 2px 0; }
    .base-row { font-weight: bold; color: #333; }
    .dashboard-disclaimer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.9); color: #666; font-size: 0.7rem; padding: 4px 20px; text-align: center; border-top: 1px solid #ddd; z-index: 3000; pointer-events: none; }
  </style>
</head>
<body>

<header class="topbar">
  <div class="brand">Cheverly Air Quality</div>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="dashboard.html" class="active">Map & Data</a>
    <a href="writeup.html">FAQs</a>
  </nav>
</header>

<div id="layout">
  <aside id="sidebar">
    <div class="card">
      <label>Location Search</label>
      <input type="text" id="addrInput" placeholder="Enter Address (e.g. 6401 Forest Rd)">
      <button id="locateBtn">Find Nearest Station</button>
    </div> 
    <div class="card"><label>Station Selection</label><select id="devSel" onchange="handleDropdownChange(this.value, true)"></select></div>
    <div class="card" style="min-height: 150px;">
        <label>Live Station Reading</label>
        <div id="details">
          <div id="statName" style="font-weight:bold; font-size: 1rem; margin-bottom:10px; color:var(--brand-navy); text-align:center;">--</div>
          <div id="statAQI" class="aqi-val" style="color:#ccc;">--</div>
          <div class="sublabel" style="color:var(--brand-navy); margin-bottom:15px;">CE-AQI</div>
          <div id="ceaqi-breakdown" class="ceaqi-breakdown" style="display:none;">
            <div style="font-weight:bold; color:var(--brand-navy); text-transform:uppercase; font-size:0.75rem; margin-bottom:6px;">CE-AQI Breakdown</div>
            <div id="ceaqi-rows"></div>
          </div>
        </div>
      </div>
    </aside>

  <div id="main-content">
    <div id="map"></div>
    <div id="chart-box"><canvas id="airChart"></canvas></div>
  </div>
</div>

<div class="dashboard-disclaimer">
  Disclaimer: This dashboard displays experimental data for community awareness. It is not for official regulatory use.
</div>

<script>
  const API_PROXY = "/api/aq";
  const SENSORS = { "52823": "EJAT.CV.6.52823", "53677": "EJAT.CV.1.53677", "54239": "EJAT.CV.6.54239", "54293": "EJAT.CV.2.54293", "203601": "EJAT.CV.1.203601", "284362": "EJAT.PG.1.284362" };
  const SPODS = [ { sn: "MOD-00745", name: "QuantAQ MOD-00745", lat: 38.9051, lon: -76.9100 }, { sn: "MOD-00746", name: "QuantAQ MOD-00746", lat: 39.1432, lon: -76.8460 } ];
  const C12S = [ { compId: "D14781", name: "C-12 D14781", lat: 38.9213, lon: -76.9175 } ];

  let markerMap = {};
  let paCoords = {};
  let userMarker = null;

  const map = L.map("map").setView([38.9213, -76.9175], 14);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  const geocoder = L.Control.Geocoder.nominatim({
      serviceUrl: 'https://nominatim.openstreetmap.org/',
      geocodingQueryParams: { 'accept-language': 'en', 'limit': 1 }
  });

  const BP_PM25_24H = [{ cLow: 0.0, cHigh: 12.0, iLow: 0, iHigh: 50 }, { cLow: 12.1, cHigh: 35.4, iLow: 51, iHigh: 100 }, { cLow: 35.5, cHigh: 55.4, iLow: 101, iHigh: 150 }, { cLow: 55.5, cHigh: 150.4, iLow: 151, iHigh: 200 }];

  function getAQIColor(aqi) {
    if (aqi <= 50) return "#00e400";
    if (aqi <= 100) return "#ffff00";
    if (aqi <= 150) return "#ff7e00";
    if (aqi <= 200) return "#ff0000";
    return "#8f3f97";
  }

  function aqiFromBreakpoints(C, table) {
    if (C === null || isNaN(C)) return null;
    const c = Number(C);
    for (const bp of table) {
      if (c >= bp.cLow && c <= bp.cHigh) return Math.round(((bp.iHigh - bp.iLow) / (bp.cHigh - bp.cLow)) * (c - bp.cLow) + bp.iLow);
    }
    return null;
  }

  // FIXED: Numeric addition to prevent "565" error 
  function calcCEAQI(pollutants) {
    const valid = pollutants.filter(p => p.aqi !== null && p.aqi > 0);
    if (valid.length === 0) return { ceaqi: 0, base: 0, adders: [] };

    const baseItem = valid.reduce((max, p) => Number(p.aqi) > Number(max.aqi) ? p : max, valid[0]);
    const base = Number(baseItem.aqi);
    const baseLabel = baseItem.label;

    const adders = [];
    let adderSum = 0;

    for (const p of valid) {
      if (p.label === baseLabel) continue;
      const aq = Number(p.aqi);
      let pct = 0;
      if (aq >= 120) pct = 0.03;
      else if (aq >= 100) pct = 0.02;
      else if (aq >= 80) pct = 0.01;

      if (pct > 0) {
        const val = Math.round(base * pct);
        adderSum += val;
        adders.push({ label: p.label, val: val, pct: pct*100 });
      }
    }
    return { ceaqi: base + adderSum, base, baseLabel, adders };
  }

  // FIXED: Address search forces Cheverly, MD context [cite: 447, 449]
  document.getElementById("locateBtn").addEventListener("click", function() {
    let addr = document.getElementById("addrInput").value;
    if (!addr) { alert("Please enter an address"); return; }
    
    if (!addr.toLowerCase().includes("cheverly")) addr += ", Cheverly, MD";
    
    this.innerText = "Searching...";
    this.disabled = true;

    geocoder.geocode(addr, (results) => {
      this.innerText = "Find Nearest Station";
      this.disabled = false;
      if (results && results.length > 0) {
        const { center } = results[0];
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.marker(center).addTo(map).bindPopup(addr).openPopup();
        map.flyTo(center, 16);

        let minDistance = Infinity, closestId = null;
        Object.keys(markerMap).forEach(id => {
          const dist = center.distanceTo(markerMap[id].getLatLng());
          if (dist < minDistance) { minDistance = dist; closestId = id; }
        });

        if (closestId) {
          document.getElementById("devSel").value = closestId;
          updateDisplay(closestId);
        }
      } else { alert("Address not found."); }
    });
  });

  async function updateDisplay(id) {
    const pa = await fetch(API_PROXY + "?action=purpleair_box").then(r => r.json());
    const station = (pa?.data || []).find(r => String(r[0]) === id);
    const pm25 = station ? Number(station[3]) : 0;
    
    // Simulate multi-pollutant data for CE-AQI [cite: 466, 505]
    const pollutants = [
      { label: "PM2.5", aqi: aqiFromBreakpoints(pm25, BP_PM25_24H) },
      { label: "Ozone (Borrowed)", aqi: 85 } 
    ];

    const result = calcCEAQI(pollutants);
    document.getElementById("statName").innerText = SENSORS[id] || id;
    document.getElementById("statAQI").innerText = result.ceaqi;
    document.getElementById("statAQI").style.color = getAQIColor(result.ceaqi);

    const rowsEl = document.getElementById("ceaqi-rows");
    document.getElementById("ceaqi-breakdown").style.display = "block";
    rowsEl.innerHTML = `<div class="ceaqi-row base-row"><span>Base (${result.baseLabel})</span><span>${result.base}</span></div>`;
    result.adders.forEach(a => {
      rowsEl.innerHTML += `<div class="ceaqi-row"><span>+ ${a.label} (${a.pct}%)</span><span>+${a.val}</span></div>`;
    });
  }

  function handleDropdownChange(id) { updateDisplay(id); }

  async function init() {
    const sel = document.getElementById("devSel");
    Object.keys(SENSORS).forEach(id => {
      sel.add(new Option(SENSORS[id], id));
      const m = L.circleMarker([38.9213 + (Math.random()-0.5)*0.015, -76.9175 + (Math.random()-0.5)*0.015], { radius: 10 }).addTo(map);
      markerMap[id] = m;
      m.on('click', () => { sel.value = id; updateDisplay(id); });
    });
    if (sel.options.length) updateDisplay(sel.value);
  }

  init();
</script>
</body>
</html>
