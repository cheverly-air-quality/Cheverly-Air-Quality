<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cheverly Air Quality | Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

  <style>
    :root { 
      --brand-navy: #1a305e; 
      --search-blue: #4477ce; 
      --aqi-green: #00e400;
      --aqi-yellow: #ffff00;
      --aqi-orange: #ff7e00;
      --aqi-red: #ff0000;
      --aqi-purple: #8f3f97;
      --aqi-maroon: #7e0023;
    }

    html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: "Segoe UI", Roboto, sans-serif; overflow: hidden; background: #fdfdfd; }
    .topbar { background: var(--brand-navy); color: white; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; height: 64px; z-index: 2000; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .brand { font-size: 1.25rem; font-weight: bold; }
    .nav a { color: white; text-decoration: none; margin-left: 1.5rem; font-size: 0.95rem; font-weight: 500; opacity: 0.8; transition: opacity 0.2s; }
    .nav a:hover { opacity: 1; }
    .nav a.active { opacity: 1; border-bottom: 2px solid white; padding-bottom: 4px; }
    
    #layout { display: flex; height: calc(100vh - 64px); width: 100vw; }
    #sidebar { width: 380px; min-width: 380px; background: #f4f6f8; border-right: 1px solid #ddd; padding: 1.25rem; overflow-y: auto; box-sizing: border-box; }
    .card { background: white; padding: 1.25rem; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    
    #main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
    #map { height: 45%; width: 100%; border-bottom: 1px solid #ddd; z-index: 1; }
    #chart-box { height: 55%; width: 100%; padding: 1.5rem; box-sizing: border-box; background: white; }

    /* FORCED TOOLTIP VISIBILITY */
    .leaflet-tooltip-own { 
      background: #333 !important; 
      color: #fff !important; 
      border: 1px solid #fff !important; 
      font-weight: bold !important; 
      font-size: 13px !important; 
      box-shadow: 0 2px 6px rgba(0,0,0,0.4) !important;
      opacity: 1 !important;
      visibility: visible !important;
    }

    .aqi-val { font-size: 72px; font-weight: 900; display: block; text-align: center; line-height: 1.1; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; }
    .sublabel { font-size: 0.75rem; color: #777; font-weight: bold; margin-top: 4px; text-align: center; text-transform: uppercase; }
    .subval { margin-top: 10px; font-size: 1.1rem; font-weight: 800; text-align: center; }
    
    label { font-size: 0.75rem; font-weight: bold; color: #666; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.5px; }
    input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 0.9rem; }
    button { width: 100%; padding: 14px; margin-top: 10px; border-radius: 8px; border: none; background: var(--search-blue); color: white; font-weight: bold; cursor: pointer; }
  </style>
</head>

<body>
<header class="topbar">
  <div class="brand">Cheverly Air Quality</div>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="dashboard.html" class="active">Map & Data</a>
    <a href="writeup.html">FAQs</a>
  </nav>
</header>

<div id="layout">
  <aside id="sidebar">
    <div class="card">
      <label>Location Search</label>
      <input type="text" id="addrInput" placeholder="Enter Street Address">
      <button id="locateBtn">Find Nearest Station</button>
    </div> 

    <div class="card">
      <label>Station Selection</label>
      <select id="devSel" onchange="handleDropdownChange(this.value, true)"></select>
    </div>

    <div class="card">
        <label>Live Station Reading</label>
        <div id="details">
          <div id="statName" style="font-weight:bold; font-size:1rem; margin-bottom:10px; color:var(--brand-navy); text-align:center;">--</div>
          <div id="statAQI" class="aqi-val" style="color:#ccc;">--</div>
          <div class="sublabel" style="color:var(--brand-navy); margin-bottom:15px;">Current AQI</div>
          <div id="val_param" class="subval">--</div>
          <div id="label_param" class="sublabel">Concentration</div>
        </div>
      </div>
    </aside>

  <div id="main-content">
    <div id="map"></div>
    <div id="chart-box"><canvas id="airChart"></canvas></div>
  </div>
</div>

<script>
  const API_PROXY = "/api/aq";
  
  const SENSORS = { 
    "284362": "EJAT.PG.1.284362", "52823": "EJAT.CV.6.52823", "53677": "EJAT.CV.1.53677", 
    "54239": "EJAT.CV.6.54239", "54293": "EJAT.CV.2.54293", "57777": "EJAT.CV.1.57777", 
    "57783": "EJAT.CV.6.57783", "57811": "EJAT.CV.4.57811", "57841": "EJAT.CV.3.57841", 
    "57955": "EJAT.FH.1.57955", "160037": "EJAT.PG.1.160037", "175563": "EJAT.PG.1.175563", 
    "178169": "EJAT.PG.1.178169", "181253": "EJAT.CH.1.181253", "184191": "EJAT.PG.1.184191", 
    "185085": "EJAT.FH.1.185085", "197937": "EJAT.PG.1.197937", "203577": "EJAT.CV.2.203577", 
    "203597": "EJAT.FH.1.203597", "203601": "EJAT.CV.1.203601", "207729": "EJAT.CV.1.207729", 
    "211993": "EJAT.CV.3.211993", "218227": "EJAT.PG.1.218227", "218237": "EJAT.PG.1.218237", 
    "218273": "EJAT.PG.1.218273", "156595": "EJAT.CV.156595" 
  };

  const SPODS = [ 
    { sn: "MOD-00745", name: "QuantAQ MOD-00745", lat: 38.905100, lon: -76.910000 }, 
    { sn: "MOD-00746", name: "QuantAQ MOD-00746", lat: 39.143200, lon: -76.846000 }, 
    { sn: "MOD-00747", name: "QuantAQ MOD-00747", lat: 39.233944, lon: -76.504501 }, 
    { sn: "MOD-00748", name: "QuantAQ MOD-00748", lat: 38.969685, lon: -76.542290 }, 
    { sn: "MOD-00749", name: "QuantAQ MOD-00749", lat: 39.055400, lon: -76.878800 } 
  ];

  const C12S = [ 
    { compId: "D14781", name: "C-12 D14781" }, { compId: "D14645", name: "C-12 D14645" }, 
    { compId: "D17615", name: "C-12 D17615" }, { compId: "E10588", name: "C-12 E10588" }, 
    { compId: "D14646", name: "C-12 D14646" } 
  ];

  let markerMap = {};
  const map = L.map("map").setView([38.9213, -76.9175], 14);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  const chart = new Chart(document.getElementById("airChart").getContext("2d"), {
    type: "line",
    data: { datasets: [{ label: "Station AQI", data: [], borderColor: "#4477ce", tension: 0.1, fill: true, backgroundColor: "rgba(68, 119, 206, 0.1)" }, { label: "DC Trend", data: [], borderColor: "red", borderDash: [5, 5], fill: false, pointRadius: 0 }] },
    options: { responsive: true, maintainAspectRatio: false, scales: { x: { type: "time", time: { unit: 'hour' } }, y: { beginAtZero: true } } }
  });

  const BP_PM25 = [ { cLow: 0.0, cHigh: 12.0, iLow: 0, iHigh: 50 }, { cLow: 12.1, cHigh: 35.4, iLow: 51, iHigh: 100 }, { cLow: 35.5, cHigh: 55.4, iLow: 101, iHigh: 150 }, { cLow: 55.5, cHigh: 150.4, iLow: 151, iHigh: 200 } ];

  function getAQIColor(aqi) {
    if (aqi <= 50) return "#00e400"; if (aqi <= 100) return "#ffff00"; if (aqi <= 150) return "#ff7e00"; if (aqi <= 200) return "#ff0000"; return "#7e0023";
  }

  function calcAQI(c) {
    const v = Number(c); if (!Number.isFinite(v)) return 0;
    for (const b of BP_PM25) { if (v >= b.cLow && v <= b.cHigh) return Math.round(((b.iHigh - b.iLow) / (b.cHigh - b.cLow)) * (v - b.cLow) + b.iLow); }
    return v > 150.4 ? 201 : 0;
  }

  async function proxyGet(p) { try { return await fetch(API_PROXY + "?" + new URLSearchParams(p)).then(r => r.json()); } catch(e) { return null; } }

  function createMarker(id, lat, lon, val) {
    if (!lat || !lon) return;
    const m = L.circleMarker([lat, lon], { radius: 12, fillColor: getAQIColor(val), color: "#000", weight: 2, fillOpacity: 0.9 }).addTo(map);
    
    // Explicitly binding with sticky: true and a specific class
    m.bindTooltip(`AQI: ${val}`, { 
        sticky: true, 
        direction: 'top', 
        className: 'leaflet-tooltip-own',
        offset: [0, -10]
    });

    m.on("click", () => { document.getElementById("devSel").value = id; handleDropdownChange(id, true); });
    markerMap[id] = m;
  }

  function handleDropdownChange(id, fly = false) { if(markerMap[id]) { if(fly) map.flyTo(markerMap[id].getLatLng(), 15); updateDisplay(id); } }

  async function updateDisplay(id) {
    const now = Math.floor(Date.now() / 1000);
    const start24 = now - 86400, start18 = now - 64800;
    
    if (id.startsWith("MOD-")) {
      const res = await proxyGet({ action: "quantaq_by_date", sn: id, date: new Date().toISOString().split('T')[0] });
      const data = (res?.data || []).map(r => ({ x: new Date(r.timestamp).getTime(), y: calcAQI(r.pm2_5) }));
      const last = data[data.length-1];
      document.getElementById("statName").innerText = id;
      document.getElementById("statAQI").innerText = last?.y || "--";
      document.getElementById("statAQI").style.color = getAQIColor(last?.y || 0);
      chart.data.datasets[0].data = data;
      chart.options.scales.x.min = start18 * 1000;
    } else if (id.startsWith("C12-")) {
      const compId = id.replace("C12-", "");
      const res = await proxyGet({ action: "grove_last", compId });
      const bc = (res || []).find(r => r.streamId === "880nm")?.data || 0;
      const aqi = Math.round((bc/600)*100);
      document.getElementById("statName").innerText = "C-12 " + compId;
      document.getElementById("statAQI").innerText = aqi;
      document.getElementById("statAQI").style.color = getAQIColor(aqi);
      chart.data.datasets[0].data = [];
    } else {
      const res = await proxyGet({ action: "purpleair_history", id, start: start24 });
      const data = (res?.data || []).map(r => ({ x: r[0]*1000, y: calcAQI(r[1]) }));
      const last = data[data.length-1];
      document.getElementById("statName").innerText = SENSORS[id];
      document.getElementById("statAQI").innerText = last?.y || "--";
      document.getElementById("statAQI").style.color = getAQIColor(last?.y || 0);
      chart.data.datasets[0].data = data;
      chart.options.scales.x.min = start24 * 1000;
    }
    chart.update();
  }

  async function init() {
    const sel = document.getElementById("devSel");
    // PurpleAir
    const pa = await proxyGet({ action: "purpleair_box" });
    if (pa?.data) {
      pa.data.forEach(r => {
        const id = String(r[0]); if(!SENSORS[id]) return;
        createMarker(id, r[1], r[2], calcAQI(r[4]));
        sel.add(new Option(SENSORS[id], id));
      });
    }
    // QuantAQ
    for (const s of SPODS) {
      const res = await proxyGet({ action: "quantaq_by_date", sn: s.sn, date: new Date().toISOString().split('T')[0] });
      const lastVal = calcAQI((res?.data || []).slice(-1)[0]?.pm2_5 || 0);
      createMarker(s.sn, s.lat, s.lon, lastVal);
      sel.add(new Option(s.name, s.sn));
    }
    // C-12
    for (const c of C12S) {
      const res = await proxyGet({ action: "grove_last", compId: c.compId });
      const rows = res || [];
      const lat = rows.find(r=>r.streamId==="lat")?.data, lon = rows.find(r=>r.streamId==="long")?.data;
      const aqi = Math.round(((rows.find(r=>r.streamId==="880nm")?.data || 0)/600)*100);
      if(lat) { createMarker("C12-"+c.compId, lat, lon, aqi); sel.add(new Option(c.name, "C12-"+c.compId)); }
    }
    handleDropdownChange(sel.value);
  }

  init();
</script>
</body>
</html>
