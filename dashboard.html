<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cheverly Air Quality | Dashboard</title>

  <!-- Core Leaflet & Chart.js -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

  <!-- Geocoding Library -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

  <style>
    :root { 
      --brand-navy: #1a305e; 
      --search-blue: #4477ce; 
      --aqi-green: #00e400;
      --aqi-yellow: #ffff00;
      --aqi-orange: #ff7e00;
      --aqi-red: #ff0000;
      --aqi-purple: #8f3f97;
      --aqi-maroon: #7e0023;
    }

    html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: "Segoe UI", Roboto, sans-serif; overflow: hidden; background: #fdfdfd; }
    .topbar { background: var(--brand-navy); color: white; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; height: 64px; z-index: 2000; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .brand { font-size: 1.25rem; font-weight: bold; }
    #layout { display: flex; height: calc(100vh - 64px); width: 100vw; }
    #sidebar { width: 380px; min-width: 380px; background: #f4f6f8; border-right: 1px solid #ddd; padding: 1.25rem; overflow-y: auto; box-sizing: border-box; }
    .card { background: white; padding: 1.25rem; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    label { font-size: 0.75rem; font-weight: bold; color: #666; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.5px; }
    input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 0.9rem; }
    button { width: 100%; padding: 14px; margin-top: 10px; border-radius: 8px; border: none; background: var(--search-blue); color: white; font-weight: bold; cursor: pointer; transition: filter 0.2s; }
    #main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
    #map { height: 45%; width: 100%; border-bottom: 1px solid #ddd; }
    #chart-box { height: 55%; width: 100%; padding: 1.5rem; box-sizing: border-box; background: white; }
    .aqi-val { font-size: 72px; font-weight: 900; display: block; text-align: center; line-height: 1.1; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; }
    .ceaqi-breakdown { margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; font-size: 0.78rem; color: #555; }
    .ceaqi-row { display: flex; justify-content: space-between; padding: 2px 0; }
    .base-row { font-weight: bold; color: #333; }
    .adder-row { color: #888; }
  </style>
</head>

<body>
<header class="topbar">
  <div class="brand">Cheverly Air Quality</div>
</header>

<div id="layout">
  <aside id="sidebar">
    <div class="card">
      <label>Location Search</label>
      <input type="text" id="addrInput" placeholder="Enter address in Cheverly...">
      <button id="locateBtn">Find Nearest Station</button>
    </div> 
    <div class="card"><label>Station Selection</label><select id="devSel" onchange="handleDropdownChange(this.value, true)"></select></div>
    <div class="card">
        <label>Live CE-AQI Reading</label>
        <div id="statName" style="font-weight:bold; font-size:1rem; margin-bottom:10px; color:var(--brand-navy); text-align:center;">--</div>
        <div id="statAQI" class="aqi-val" style="color:#ccc;">--</div>
        <div id="ceaqi-breakdown" class="ceaqi-breakdown" style="display:none;">
          <div style="font-weight:bold; text-transform:uppercase; font-size:0.7rem; margin-bottom:5px;">Breakdown</div>
          <div id="ceaqi-rows"></div>
        </div>
    </div>
  </aside>

  <div id="main-content">
    <div id="map"></div>
    <div id="chart-box"><canvas id="airChart"></canvas></div>
  </div>
</div>

<script>
const API_PROXY = "/api/aq";

/* ============================================================
   EPA BREAKPOINT TABLES & MATH
   ============================================================ */
const BP_PM25_24H = [{ cLow: 0.0, cHigh: 12.0, iLow: 0, iHigh: 50 }, { cLow: 12.1, cHigh: 35.4, iLow: 51, iHigh: 100 }, { cLow: 35.5, cHigh: 55.4, iLow: 101, iHigh: 150 }, { cLow: 55.5, cHigh: 150.4, iLow: 151, iHigh: 200 }, { cLow: 150.5, cHigh: 250.4, iLow: 201, iHigh: 300 }];
const BP_PM10_24H = [{ cLow: 0, cHigh: 54, iLow: 0, iHigh: 50 }, { cLow: 55, cHigh: 154, iLow: 51, iHigh: 100 }, { cLow: 155, cHigh: 254, iLow: 101, iHigh: 150 }];
const BP_O3_8H = [{ cLow: 0, cHigh: 54, iLow: 0, iHigh: 50 }, { cLow: 55, cHigh: 70, iLow: 51, iHigh: 100 }, { cLow: 71, cHigh: 85, iLow: 101, iHigh: 150 }];
const BP_CO_8H = [{ cLow: 0.0, cHigh: 4.4, iLow: 0, iHigh: 50 }, { cLow: 4.5, cHigh: 9.4, iLow: 51, iHigh: 100 }];
const BP_NO2_1H = [{ cLow: 0, cHigh: 53, iLow: 0, iHigh: 50 }, { cLow: 54, cHigh: 100, iLow: 51, iHigh: 100 }];

function aqiFromBreakpoints(C, table) { 
  if (C === null || !Number.isFinite(Number(C))) return null; 
  const c = Number(C); 
  for (const bp of table) { 
    if (c >= bp.cLow && c <= bp.cHigh) return Math.round(((bp.iHigh - bp.iLow) / (bp.cHigh - bp.cLow)) * (c - bp.cLow) + bp.iLow); 
  } 
  return null; 
}

/* ============================================================
   STATION DEFINITIONS & CACHING
   ============================================================ */
const SENSORS = { "52823": "EJAT.CV.6.52823", "53677": "EJAT.CV.1.53677", "54239": "EJAT.CV.6.54239", "54293": "EJAT.CV.2.54293", "57777": "EJAT.CV.1.57777", "57783": "EJAT.CV.6.57783", "57811": "EJAT.CV.4.57811", "57841": "EJAT.CV.3.57841", "203577": "EJAT.CV.2.203577", "203601": "EJAT.CV.1.203601", "207729": "EJAT.CV.1.207729", "211993": "EJAT.CV.3.211993", "156595": "EJAT.CV.156595", "284362": "EJAT.PG.1.284362", "160037": "EJAT.PG.1.160037", "175563": "EJAT.PG.1.175563", "178169": "EJAT.PG.1.178169", "184191": "EJAT.PG.1.184191", "197937": "EJAT.PG.1.197937", "218227": "EJAT.PG.1.218227", "218237": "EJAT.PG.1.218237", "218273": "EJAT.PG.1.218273", "57955": "EJAT.FH.1.57955", "185085": "EJAT.FH.1.185085", "203597": "EJAT.FH.1.203597", "181253": "EJAT.CH.1.181253" };
const SPODS = [{ sn: "MOD-00745", name: "QuantAQ 745", lat: 38.9051, lon: -76.9100 }, { sn: "MOD-00746", name: "QuantAQ 746", lat: 39.1432, lon: -76.8460 }, { sn: "MOD-00749", name: "QuantAQ 749", lat: 39.0554, lon: -76.8788 }];
const C12S = [{ compId: "D14781", lat: 38.9213, lon: -76.9175 }, { compId: "D14645", lat: 38.9100, lon: -76.9000 }];

let markerMap = {}, paCoords = {}, quantCache = {}, c12Cache = {};

/* ============================================================
   VALID SENSOR PICKING LOGIC
   ============================================================ */
function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function nearestValidQuantAQ(lat, lon) {
  const sorted = SPODS.map(s => ({ ...s, dist: haversineKm(lat, lon, s.lat, s.lon) })).sort((a, b) => a.dist - b.dist);
  for (const s of sorted) {
    const d = quantCache[s.sn];
    if (d && (safeNum(d.o3) || safeNum(d.co) || safeNum(d.no2))) return s;
  }
  return null;
}

function nearestValidC12(lat, lon) {
  const sorted = C12S.map(c => ({ ...c, dist: haversineKm(lat, lon, c.lat, c.lon) })).sort((a, b) => a.dist - b.dist);
  for (const c of sorted) {
    const d = c12Cache[c.compId];
    if (d && d.bc > 0) return c;
  }
  return null;
}

/* ============================================================
   CE-AQI CALCULATION
   ============================================================ */
function calcCEAQI(pollutants) {
  const valid = pollutants.filter(p => p.aqi !== null && p.aqi > 0);
  if (!valid.length) return { ceaqi: 0, base: 0, baseLabel: "N/A", adders: [] };
  const baseItem = valid.reduce((max, p) => p.aqi > max.aqi ? p : max, valid[0]);
  const adders = [];
  for (const p of valid) {
    if (p.label === baseItem.label) continue;
    let pct = p.aqi >= 120 ? 0.03 : p.aqi >= 100 ? 0.02 : p.aqi >= 80 ? 0.01 : 0;
    if (pct) adders.push({ label: p.label, val: Math.round(baseItem.aqi * pct), pct: pct * 100 });
  }
  return { ceaqi: baseItem.aqi + adders.reduce((s, a) => s + a.val, 0), base: baseItem.aqi, baseLabel: baseItem.label, adders };
}

function safeNum(x) { const v = Number(x); return Number.isFinite(v) ? v : null; }

/* ============================================================
   INITIALIZATION & MAP RENDER
   ============================================================ */
const map = L.map("map").setView([38.9213, -76.9175], 14);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

async function init() {
  const today = new Date().toISOString().split('T')[0];
  
  // Cache QuantAQ & C12
  for (const s of SPODS) {
    const res = await fetch(`${API_PROXY}?action=quantaq_by_date&sn=${s.sn}&date=${today}`).then(r => r.json());
    quantCache[s.sn] = (res.data?.data || res.data || []).slice(-1)[0];
  }
  for (const c of C12S) {
    const res = await fetch(`${API_PROXY}?action=grove_last&compId=${c.compId}`).then(r => r.json());
    const row = (res.data || res || []).find(r => r.streamId === "880nm");
    c12Cache[c.compId] = { bc: safeNum(row?.data) };
  }

  // Fetch PurpleAir & Populate
  const pa = await fetch(`${API_PROXY}?action=purpleair_box`).then(r => r.json());
  const arr = pa.data || [];
  
  const devSel = document.getElementById("devSel");
  for (const r of arr) {
    const id = String(r[0]), lat = r[1], lon = r[2], pm = safeNum(r[3]);
    paCoords[id] = { lat, lon, pm };
    
    const opt = document.createElement("option");
    opt.value = id; opt.text = SENSORS[id] || id;
    devSel.add(opt);

    const m = L.circleMarker([lat, lon], { radius: 10, fillColor: "#4477ce", fillOpacity: 0.8, color: "#000", weight: 1 }).addTo(map);
    markerMap[id] = m;
  }
  
  if (arr.length) handleDropdownChange(String(arr[0][0]), false);
}

function handleDropdownChange(id, userTriggered) {
  const station = paCoords[id];
  const pollutants = [{ label: "PM2.5", aqi: aqiFromBreakpoints(station.pm, BP_PM25_24H) }];
  
  const q = nearestValidQuantAQ(station.lat, station.lon);
  if (q) {
    const d = quantCache[q.sn];
    pollutants.push({ label: "O3", aqi: aqiFromBreakpoints(safeNum(d.o3), BP_O3_8H) });
    pollutants.push({ label: "NO2", aqi: aqiFromBreakpoints(safeNum(d.no2), BP_NO2_1H) });
  }

  const c = nearestValidC12(station.lat, station.lon);
  if (c) {
    const d = c12Cache[c.compId];
    pollutants.push({ label: "BC", aqi: Math.round((d.bc / 600) * 100) });
  }

  const res = calcCEAQI(pollutants);
  document.getElementById("statAQI").innerText = res.ceaqi;
  document.getElementById("statName").innerText = SENSORS[id];
  
  const rows = document.getElementById("ceaqi-rows");
  rows.innerHTML = `<div class="ceaqi-row base-row"><span>${res.baseLabel} (Base)</span><span>${res.base}</span></div>`;
  res.adders.forEach(a => {
    rows.innerHTML += `<div class="ceaqi-row adder-row"><span>+ ${a.label} (${a.pct}%)</span><span>+${a.val}</span></div>`;
  });
  document.getElementById("ceaqi-breakdown").style.display = "block";
  
  if (userTriggered) map.flyTo([station.lat, station.lon], 16);
}

init();
</script>
</body>
</html>
